name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node & Dependencies
        run: |
          npm install --legacy-peer-deps
          npm run build
          rm -rf android
          npx cap add android
          
          # --- ส่วนขอสิทธิ์การใช้งาน (Permissions) ---
          # 1. ขอสิทธิ์อินเทอร์เน็ต (เพื่อให้แปลภาษาได้)
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          # 2. ขอสิทธิ์ใช้กล้อง (เพื่อฟังก์ชันถ่ายรูปแปลภาษา)
          sed -i '/<application/i <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          # 3. ขอสิทธิ์ใช้ไมโครโฟน (เพื่อฟังก์ชันสั่งงานด้วยเสียง)
          sed -i '/<application/i <uses-permission android:name="android.permission.RECORD_AUDIO" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
          
          npx cap sync android
        env:
          # ส่วนดึงกุญแจจาก GitHub Secrets ที่เฮียตั้งค่าไว้
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiaOuan-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
